name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --output-format=github || true

      - name: Byte-compile sources
        run: python -m compileall -q app.py src

      - name: Import smoke test
        run: |
          python -c "import src.config, src.data_collector, src.strategy, src.risk, src.backtest, src.predictor, src.features, src.indicators; print('src imports OK')"
